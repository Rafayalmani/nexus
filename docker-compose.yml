version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/coordinator/migrations:/docker-entrypoint-initdb.d

  coordinator:
    build:
      context: .
      dockerfile: services/coordinator/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus?sslmode=disable
    depends_on:
      - postgres

volumes:
  postgres_data:
